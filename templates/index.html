<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dōkō (同行) — Walking Together Through Scripture</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div id="phone-frame">

    <header id="top-bar">
      <div class="pill" id="reference-pill">…</div>
      <button class="pill pill-muted pill-button" id="version-pill" title="Compare translations">…</button>
      <div class="top-bar-spacer"></div>
      <button id="play-audio-btn" class="icon-btn" title="Listen to this verse">🔊</button>
      <button id="more-btn" class="icon-btn" title="Compare translations">⋯</button>
    </header>

    <div id="memory-banner" class="hidden">
      <span>You explored <strong id="memory-word"></strong> before — tap it again any time.</span>
    </div>

    <main id="verse-scroll">
      <p id="verse-loading">Loading today's verse…</p>

      <p class="verse-line" id="verse-chinese-line">
        <sup id="verse-number"></sup><span id="verse-chinese"></span>
      </p>

      <div class="verse-line verse-compare hidden" id="compare-panel">
        <button id="close-compare-btn" class="panel-close-btn" title="Close comparison">×</button>
        <div id="compare-version-title"></div>
        <div id="compare-text"></div>
      </div>

      <footer id="copyright-footer"></footer>
    </main>

    <nav id="bottom-nav" title="Demo only — single screen MVP">
      <div class="nav-item active"><span class="nav-icon">📖</span><span>Bible</span></div>
      <div class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></div>
      <div class="nav-item"><span class="nav-icon">✅</span><span>Plans</span></div>
      <div class="nav-item"><span class="nav-icon">🔍</span><span>Discover</span></div>
      <div class="nav-item"><span class="nav-icon">👤</span><span>You</span></div>
    </nav>
  </div>

  <div id="explanation-sheet" class="bottom-sheet hidden">
    <div class="sheet-backdrop"></div>
    <div class="sheet-card">
      <div class="sheet-handle"></div>
      <button class="sheet-close-btn" id="close-sheet-btn">×</button>
      <div class="sheet-title-row">
        <h2 id="explanation-word"></h2>
        <button id="play-explanation-audio-btn" class="icon-btn" title="Listen to this explanation">🔊</button>
      </div>
      <p id="explanation-text">Thinking…</p>
    </div>
  </div>

  <div id="compare-sheet" class="bottom-sheet hidden">
    <div class="sheet-backdrop"></div>
    <div class="sheet-card">
      <div class="sheet-handle"></div>
      <button class="sheet-close-btn" id="close-compare-sheet-btn">×</button>
      <div class="sheet-header">
        <button id="compare-back-btn" class="hidden">‹</button>
        <h2 id="compare-sheet-title">Compare Translations</h2>
      </div>

      <div id="compare-language-list" class="picker-list"></div>
      <div id="compare-version-list" class="picker-list hidden"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
