<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dōkō (同行) — Walking Together Through Scripture</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div id="phone-frame">

    <div id="top-pane">
      <header id="top-bar">
        <div class="pill" id="reference-pill">…</div>
        <button class="pill pill-muted pill-button" id="version-pill" title="Change the primary reading language">…</button>
        <div class="top-bar-spacer"></div>
        <button id="jump-to-verse-btn" class="icon-btn hidden" title="Jump to today's featured verse">📍</button>
        <button id="play-audio-btn" class="icon-btn" title="Listen to this chapter">🔊</button>
        <button id="more-btn" class="icon-btn" title="Compare translations">⋯</button>
      </header>

      <div id="memory-banner" class="hidden">
        <span>You explored <strong id="memory-word"></strong> before — tap it again any time.</span>
      </div>

      <main id="verse-scroll">
        <p id="verse-loading">Loading today's chapter…</p>
        <div id="verse-chapter"></div>
        <footer id="copyright-footer"></footer>
      </main>
    </div>

    <div id="bottom-pane">
      <div id="compare-header">
        <button id="compare-back-btn" class="hidden">‹</button>
        <div id="compare-header-title">Compare</div>
        <button id="compare-change-btn" class="hidden">Change ›</button>
      </div>

      <div id="compare-body">
        <div id="compare-language-list" class="picker-list"></div>
        <div id="compare-version-list" class="picker-list hidden"></div>
        <div id="compare-result" class="hidden">
          <div class="compare-result-header">
            <div id="compare-version-title"></div>
            <button id="show-in-chapter-btn">📍 Show in chapter</button>
          </div>
          <div id="compare-text"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="explanation-sheet" class="bottom-sheet hidden">
    <div class="sheet-backdrop"></div>
    <div class="sheet-card">
      <div class="sheet-handle"></div>
      <button class="sheet-close-btn" id="close-sheet-btn">×</button>
      <div class="sheet-title-row">
        <h2 id="explanation-word"></h2>
        <button id="play-explanation-audio-btn" class="icon-btn" title="Listen to this explanation">🔊</button>
      </div>
      <p id="explanation-text">Thinking…</p>
    </div>
  </div>

  <div id="primary-picker-sheet" class="bottom-sheet hidden">
    <div class="sheet-backdrop"></div>
    <div class="sheet-card">
      <div class="sheet-handle"></div>
      <button class="sheet-close-btn" id="close-primary-sheet-btn">×</button>
      <div class="sheet-header">
        <button id="primary-back-btn" class="hidden">‹</button>
        <h2 id="primary-sheet-title">Reading Language</h2>
      </div>

      <div id="primary-language-list" class="picker-list"></div>
      <div id="primary-version-list" class="picker-list hidden"></div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
